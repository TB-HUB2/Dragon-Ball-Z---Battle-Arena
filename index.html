<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Ball Z - Kampfarena</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    overflow: hidden;
  }

  .screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
  .screen.active { display: flex; }

  /* === TITLE === */
  #title-screen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d0d0d 100%);
  }
  #title-screen h1 {
    font-size: 2.2rem;
    color: #ff8c00;
    text-shadow: 0 0 20px #ff4500, 0 0 40px #ff4500;
    margin-bottom: 10px;
    text-align: center;
    line-height: 1.5;
  }
  #title-screen h2 {
    font-size: 1rem;
    color: #ffd700;
    margin-bottom: 40px;
    text-shadow: 0 0 10px #ffd700;
  }
  .start-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 1rem;
    padding: 15px 40px;
    background: linear-gradient(180deg, #ff8c00, #ff4500);
    color: #fff;
    border: 3px solid #ffd700;
    border-radius: 8px;
    cursor: pointer;
    text-shadow: 1px 1px 2px #000;
    animation: pulse 1.5s infinite;
  }
  .start-btn:hover { transform: scale(1.05); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 10px #ff4500; }
    50% { box-shadow: 0 0 30px #ff4500, 0 0 60px #ff8c00; }
  }

  /* === SELECT === */
  #select-screen {
    flex-direction: column;
    align-items: center;
    background: radial-gradient(ellipse at center, #0a1628 0%, #0d0d0d 100%);
    padding: 20px;
    overflow-y: auto;
  }
  #select-screen h2 {
    font-size: 1.2rem;
    color: #00bfff;
    margin: 20px 0 30px;
    text-shadow: 0 0 10px #00bfff;
  }
  .char-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    max-width: 1000px;
  }
  .char-card {
    width: 165px;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border: 2px solid #333;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .char-card:hover {
    border-color: #ffd700;
    background: rgba(255,215,0,0.1);
    transform: translateY(-5px);
  }
  .char-card.selected {
    border-color: #00ff00;
    background: rgba(0,255,0,0.1);
    box-shadow: 0 0 20px rgba(0,255,0,0.3);
  }
  .char-card .char-sprite-box {
    width: 100px;
    height: 110px;
    margin: 0 auto 10px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .char-card .char-sprite-box svg { width: 80px; height: auto; }
  .char-card .name { font-size: 0.6rem; color: #ffd700; margin-bottom: 8px; }
  .char-card .stats { font-size: 0.45rem; color: #aaa; line-height: 1.8; }
  .fight-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.9rem;
    padding: 12px 35px;
    margin-top: 30px;
    background: linear-gradient(180deg, #dc143c, #8b0000);
    color: #fff;
    border: 3px solid #ff4500;
    border-radius: 8px;
    cursor: pointer;
    display: none;
  }
  .fight-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px #ff4500; }
  .fight-btn.visible { display: block; }

  /* === BATTLE === */
  #battle-screen {
    flex-direction: column;
    background: linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 30%, #4a2c6e 60%, #1a3a1a 85%, #0d2d0d 100%);
    position: relative;
  }
  .battle-bg {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden; z-index: 0;
  }
  .battle-bg .mountain {
    position: absolute; bottom: 25%; width: 0; height: 0;
    border-left: 80px solid transparent;
    border-right: 80px solid transparent;
    border-bottom: 120px solid #1a2a1a;
    opacity: 0.3;
  }
  .battle-bg .mountain:nth-child(1) { left: 5%; border-bottom-width: 150px; border-left-width: 100px; border-right-width: 100px; }
  .battle-bg .mountain:nth-child(2) { left: 25%; border-bottom-width: 100px; }
  .battle-bg .mountain:nth-child(3) { right: 15%; border-bottom-width: 130px; border-left-width: 90px; border-right-width: 90px; }
  .battle-bg .ground {
    position: absolute; bottom: 0; left: 0; right: 0; height: 25%;
    background: linear-gradient(180deg, #2a4a2a, #1a3a1a);
    border-top: 2px solid #3a5a3a;
  }
  .battle-area { flex: 1; position: relative; z-index: 1; }

  .hp-box {
    position: absolute;
    background: rgba(0,0,0,0.85);
    border: 3px solid #555;
    border-radius: 10px;
    padding: 12px 18px;
    min-width: 260px;
  }
  .hp-box.enemy { top: 30px; left: 30px; }
  .hp-box.player { bottom: 160px; right: 30px; }
  .hp-box .fighter-name { font-size: 0.7rem; margin-bottom: 6px; }
  .hp-box .hp-bar-container {
    background: #333; border-radius: 4px; height: 14px; overflow: hidden; position: relative;
  }
  .hp-box .hp-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .hp-bar.high { background: linear-gradient(90deg, #00cc00, #00ff00); }
  .hp-bar.mid { background: linear-gradient(90deg, #cc8800, #ffaa00); }
  .hp-bar.low { background: linear-gradient(90deg, #cc0000, #ff2200); }
  .hp-box .hp-text { font-size: 0.5rem; text-align: right; margin-top: 4px; color: #aaa; }
  .hp-box .level { font-size: 0.5rem; color: #aaa; float: right; }

  .fighter {
    position: absolute;
    z-index: 5;
    transition: transform 0.1s;
  }
  .fighter svg { width: 120px; height: auto; }
  .fighter.player-fighter { bottom: 22%; left: 10%; }
  .fighter.enemy-fighter { top: 12%; right: 12%; }

  @keyframes playerAttack {
    0% { transform: translateX(0); }
    30% { transform: translateX(200px) scale(1.15); }
    50% { transform: translateX(200px) scale(1.15); }
    100% { transform: translateX(0); }
  }
  @keyframes enemyAttack {
    0% { transform: translateX(0) scaleX(-1); }
    30% { transform: translateX(-200px) scaleX(-1) scale(1.15); }
    50% { transform: translateX(-200px) scaleX(-1) scale(1.15); }
    100% { transform: translateX(0) scaleX(-1); }
  }
  @keyframes takeDamage {
    0% { filter: brightness(1); transform: translateX(0); }
    20% { filter: brightness(3) hue-rotate(90deg); transform: translateX(10px); }
    40% { filter: brightness(1); transform: translateX(-10px); }
    60% { filter: brightness(3) hue-rotate(90deg); transform: translateX(10px); }
    80% { filter: brightness(1); transform: translateX(-10px); }
    100% { filter: brightness(1); transform: translateX(0); }
  }
  @keyframes faint {
    0% { opacity: 1; transform: translateY(0) rotate(0); }
    100% { opacity: 0; transform: translateY(50px) rotate(20deg); }
  }
  .fighter.attacking-player { animation: playerAttack 0.6s ease-in-out; }
  .fighter.attacking-enemy { animation: enemyAttack 0.6s ease-in-out; }
  .fighter.damaged { animation: takeDamage 0.5s ease; }
  .fighter.fainted { animation: faint 0.8s ease forwards; }

  #fxCanvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 15; pointer-events: none;
  }

  @keyframes charging {
    0%, 100% { filter: brightness(1.2); transform: translateY(0); }
    25% { filter: brightness(1.5) saturate(1.4); transform: translateY(-2px); }
    50% { filter: brightness(1.8) saturate(1.6); transform: translateY(1px); }
    75% { filter: brightness(1.5) saturate(1.4); transform: translateY(-1px); }
  }
  .fighter.charging { animation: charging 0.3s ease infinite; }

  @keyframes teleportOut {
    0% { opacity: 1; filter: brightness(1); }
    50% { opacity: 0.3; filter: brightness(3) hue-rotate(200deg); }
    100% { opacity: 0; }
  }
  @keyframes teleportIn {
    0% { opacity: 0; }
    50% { opacity: 0.3; filter: brightness(3) hue-rotate(200deg); }
    100% { opacity: 1; filter: brightness(1); }
  }
  .fighter.teleport-out { animation: teleportOut 0.3s ease forwards; }
  .fighter.teleport-in { animation: teleportIn 0.3s ease forwards; }

  .screen-flash {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 20; pointer-events: none; opacity: 0;
  }
  .screen-flash.active { animation: flashAnim 0.3s ease; }
  @keyframes flashAnim { 0% { opacity: 0.8; } 100% { opacity: 0; } }

  .battle-menu {
    position: absolute; bottom: 0; left: 0; right: 0; height: 150px;
    background: rgba(0,0,0,0.92); border-top: 3px solid #555; z-index: 10; display: flex;
  }
  .message-box {
    flex: 1; padding: 15px 20px; font-size: 0.65rem; line-height: 1.8;
    display: flex; align-items: center;
  }
  .message-box .typing-text { overflow: hidden; white-space: pre-wrap; }
  .action-menu {
    width: 300px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
    padding: 10px; border-left: 3px solid #555;
  }
  .action-btn {
    font-family: 'Press Start 2P', monospace; font-size: 0.55rem; padding: 8px;
    background: rgba(255,255,255,0.05); color: #fff; border: 2px solid #444;
    border-radius: 6px; cursor: pointer; transition: all 0.15s; text-align: left;
  }
  .action-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); border-color: #ffd700; }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .action-btn .atk-type { display: block; font-size: 0.4rem; color: #888; margin-top: 3px; }

  /* === RESULT === */
  #result-screen {
    flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d0d0d 100%);
  }
  #result-screen .result-sprite { margin-bottom: 20px; }
  #result-screen .result-sprite svg { width: 140px; height: auto; }
  #result-screen h2 { font-size: 1.4rem; margin-bottom: 10px; text-shadow: 0 0 20px currentColor; }
  #result-screen p { font-size: 0.6rem; color: #aaa; margin-bottom: 30px; }
  .enemy-fighter { transform: scaleX(-1); }
</style>
</head>
<body>

<div id="title-screen" class="screen active">
  <h1>DRAGON BALL Z</h1>
  <h2>Kampfarena</h2>
  <button class="start-btn" onclick="sfx.menuConfirm(); showScreen('select-screen')">START</button>
</div>

<div id="select-screen" class="screen">
  <h2>Waehle deinen Kaempfer!</h2>
  <div class="char-grid" id="charGrid"></div>
  <button class="fight-btn" id="fightBtn" onclick="startBattle()">KAMPF!</button>
</div>

<div id="battle-screen" class="screen">
  <div class="battle-bg">
    <div class="mountain"></div><div class="mountain"></div><div class="mountain"></div>
    <div class="ground"></div>
  </div>
  <div class="battle-area">
    <div class="hp-box enemy">
      <span class="fighter-name" id="enemyName">???</span>
      <span class="level" id="enemyLevel">Lv 50</span>
      <div class="hp-bar-container"><div class="hp-bar high" id="enemyHpBar" style="width:100%"></div></div>
      <div class="hp-text" id="enemyHpText">??? / ???</div>
    </div>
    <div class="hp-box player">
      <span class="fighter-name" id="playerName">???</span>
      <span class="level" id="playerLevel">Lv 50</span>
      <div class="hp-bar-container"><div class="hp-bar high" id="playerHpBar" style="width:100%"></div></div>
      <div class="hp-text" id="playerHpText">??? / ???</div>
    </div>
    <div class="fighter player-fighter" id="playerFighter"></div>
    <div class="fighter enemy-fighter" id="enemyFighter"></div>
    <div class="screen-flash" id="screenFlash"></div>
    <canvas id="fxCanvas"></canvas>
  </div>
  <div class="battle-menu">
    <div class="message-box"><div class="typing-text" id="messageText"></div></div>
    <div class="action-menu" id="actionMenu"></div>
  </div>
</div>

<div id="result-screen" class="screen">
  <div class="result-sprite" id="resultSprite"></div>
  <h2 id="resultTitle"></h2>
  <p id="resultText"></p>
  <button class="start-btn" onclick="resetGame()">NOCHMAL!</button>
</div>

// === AUDIO ENGINE ===
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type='sine', vol=0.15, rampDown=true) {
  const ac = getAudio();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ac.currentTime);
  gain.gain.setValueAtTime(vol, ac.currentTime);
  if (rampDown) gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  osc.connect(gain); gain.connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime + duration);
}

function playNoise(duration, vol=0.12) {
  const ac = getAudio();
  const bufSize = ac.sampleRate * duration;
  const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  src.buffer = buf;
  const gain = ac.createGain();
  gain.gain.setValueAtTime(vol, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  src.connect(gain); gain.connect(ac.destination);
  src.start();
}

// === BATTLE MUSIC ===
let bgmNodes = null;
function startBGM() {
  stopBGM();
  const ac = getAudio();
  const master = ac.createGain();
  master.gain.setValueAtTime(0.06, ac.currentTime);
  master.connect(ac.destination);

  // bass line
  const bassOsc = ac.createOscillator();
  bassOsc.type = 'square';
  bassOsc.frequency.setValueAtTime(55, ac.currentTime);
  const bassGain = ac.createGain();
  bassGain.gain.setValueAtTime(0.5, ac.currentTime);
  bassOsc.connect(bassGain); bassGain.connect(master);
  bassOsc.start();

  // pulse rhythm via gain modulation
  const lfo = ac.createOscillator();
  lfo.type = 'square';
  lfo.frequency.setValueAtTime(3.5, ac.currentTime);
  const lfoGain = ac.createGain();
  lfoGain.gain.setValueAtTime(0.4, ac.currentTime);
  lfo.connect(lfoGain); lfoGain.connect(bassGain.gain);
  lfo.start();

  // tension pad
  const pad = ac.createOscillator();
  pad.type = 'sawtooth';
  pad.frequency.setValueAtTime(110, ac.currentTime);
  const padGain = ac.createGain();
  padGain.gain.setValueAtTime(0.15, ac.currentTime);
  const padFilter = ac.createBiquadFilter();
  padFilter.type = 'lowpass';
  padFilter.frequency.setValueAtTime(400, ac.currentTime);
  pad.connect(padFilter); padFilter.connect(padGain); padGain.connect(master);
  pad.start();

  // hi-hat rhythm
  const hiHatInterval = setInterval(() => {
    if (!bgmNodes) { clearInterval(hiHatInterval); return; }
    playNoise(0.03, 0.03);
  }, 143);

  // bass note changes
  const bassNotes = [55, 55, 65, 55, 73, 65, 55, 82];
  let bassIdx = 0;
  const bassInterval = setInterval(() => {
    if (!bgmNodes) { clearInterval(bassInterval); return; }
    bassIdx = (bassIdx + 1) % bassNotes.length;
    bassOsc.frequency.setValueAtTime(bassNotes[bassIdx], ac.currentTime);
    pad.frequency.setValueAtTime(bassNotes[bassIdx] * 2, ac.currentTime);
  }, 571);

  bgmNodes = { oscs: [bassOsc, lfo, pad], master, intervals: [hiHatInterval, bassInterval] };
}

function stopBGM() {
  if (!bgmNodes) return;
  bgmNodes.intervals.forEach(i => clearInterval(i));
  bgmNodes.oscs.forEach(o => { try { o.stop(); } catch(e){} });
  bgmNodes.master.disconnect();
  bgmNodes = null;
}

// === CANVAS FX ===
let canvas, ctx;
function initCanvas() {
  canvas = document.getElementById('fxCanvas');
  const area = canvas.parentElement;
  canvas.width = area.clientWidth;
  canvas.height = area.clientHeight;
  ctx = canvas.getContext('2d');
}
function clearFx() { if(ctx) ctx.clearRect(0,0,canvas.width,canvas.height); }

function getPos(el) {
  const r = el.getBoundingClientRect();
  const cr = canvas.getBoundingClientRect();
  return { x: r.left - cr.left + r.width/2, y: r.top - cr.top + r.height/2 };
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

// === CANVAS DRAWING HELPERS ===
function drawEnergyBall(x, y, radius, c1, c2, alpha=1) {
  ctx.save(); ctx.globalAlpha = alpha;
  const g = ctx.createRadialGradient(x,y,0,x,y,radius);
  g.addColorStop(0, '#fff'); g.addColorStop(0.3, c1); g.addColorStop(1, c2);
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x,y,radius,0,Math.PI*2); ctx.fill();
  // glow
  ctx.globalAlpha = alpha * 0.4;
  const g2 = ctx.createRadialGradient(x,y,radius*0.5,x,y,radius*2.5);
  g2.addColorStop(0, c1); g2.addColorStop(1, 'transparent');
  ctx.fillStyle = g2; ctx.beginPath(); ctx.arc(x,y,radius*2.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBeam(x1,y1,x2,y2, width, c1, c2, alpha=1) {
  ctx.save(); ctx.globalAlpha = alpha;
  const angle = Math.atan2(y2-y1, x2-x1);
  const len = Math.hypot(x2-x1, y2-y1);
  // glow layer
  ctx.globalAlpha = alpha * 0.3;
  ctx.strokeStyle = c2; ctx.lineWidth = width * 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  // outer beam
  ctx.globalAlpha = alpha * 0.6;
  ctx.strokeStyle = c1; ctx.lineWidth = width * 1.8;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  // core
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = width * 0.6;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.restore();
}

function drawSpiralBeam(x1,y1,x2,y2, width, c1, c2, time, alpha=1) {
  ctx.save(); ctx.globalAlpha = alpha;
  const dx = x2-x1, dy = y2-y1, len = Math.hypot(dx,dy);
  const nx = -dy/len, ny = dx/len;
  // glow
  ctx.globalAlpha = alpha * 0.25;
  ctx.strokeStyle = c2; ctx.lineWidth = width * 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  // core
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = width * 0.5;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  // spiral lines
  ctx.strokeStyle = c1; ctx.lineWidth = width * 0.8;
  for (let s = 0; s < 2; s++) {
    ctx.beginPath();
    for (let i = 0; i <= 40; i++) {
      const t = i / 40;
      const px = x1 + dx * t;
      const py = y1 + dy * t;
      const offset = Math.sin(t * 20 + time * 10 + s * Math.PI) * width * 1.2;
      const fx = px + nx * offset;
      const fy = py + ny * offset;
      if (i === 0) ctx.moveTo(fx, fy); else ctx.lineTo(fx, fy);
    }
    ctx.stroke();
  }
  ctx.restore();
}

function drawImpact(x, y, radius, color, alpha=1) {
  ctx.save(); ctx.globalAlpha = alpha;
  // star burst
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(a) * radius, y + Math.sin(a) * radius);
    ctx.lineTo(x + Math.cos(a + 0.15) * radius * 0.3, y + Math.sin(a + 0.15) * radius * 0.3);
    ctx.fill();
  }
  drawEnergyBall(x, y, radius * 0.4, '#fff', color, alpha);
  ctx.restore();
}

function drawAura(x, y, h, color, alpha, time) {
  ctx.save(); ctx.globalAlpha = alpha * 0.5;
  for (let i = 0; i < 12; i++) {
    const a = (i/12)*Math.PI*2 + time*3;
    const r = h * 0.5 + Math.sin(time*8+i)*h*0.15;
    const px = x + Math.cos(a) * h * 0.25;
    const py = y - h*0.1 + Math.sin(a) * h * 0.35;
    const g = ctx.createRadialGradient(px,py,0,px,py,r*0.4);
    g.addColorStop(0, color); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(px,py,r*0.4,0,Math.PI*2); ctx.fill();
  }
  // flame tips going up
  ctx.globalAlpha = alpha * 0.6;
  for (let i = 0; i < 5; i++) {
    const ox = x - h*0.3 + (i/4)*h*0.6;
    const flameH = h*0.3 + Math.sin(time*10+i*2)*h*0.15;
    const g = ctx.createRadialGradient(ox, y-h*0.4, 0, ox, y-h*0.4-flameH, flameH);
    g.addColorStop(0, color); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(ox, y-h*0.4-flameH*0.5, flameH, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawParticles(particles) {
  particles.forEach(p => {
    ctx.save(); ctx.globalAlpha = p.alpha;
    const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    g.addColorStop(0,'#fff'); g.addColorStop(0.5,p.color); g.addColorStop(1,'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// animated loop helper
function animLoop(duration, fn) {
  return new Promise(resolve => {
    const start = performance.now();
    function tick(now) {
      const t = Math.min((now - start) / duration, 1);
      clearFx();
      fn(t);
      if (t < 1) requestAnimationFrame(tick); else { clearFx(); resolve(); }
    }
    requestAnimationFrame(tick);
  });
}

function flashScreen(color) {
  const flash = document.getElementById('screenFlash');
  flash.style.background = color;
  flash.className = 'screen-flash active';
  setTimeout(() => { flash.className = 'screen-flash'; }, 300);
  sfx.explosion();
}

      drawSpiralBeam(f.x+45, f.y-20, ex, ey, 5, '#aaff44', '#228800', p*3);

      if (reach >= 1) drawImpact(t.x, t.y, 30+p*20, '#44ff44', Math.max(0,1-(p-0.5)*3));
    });
  },

  async masenko(from, to) {
    const f = getPos(from), t = getPos(to);
    from.classList.add('charging'); sfx.charge();
    // hands above head
    await animLoop(400, p => {
      drawAura(f.x,f.y,60,'#ffdd00',p*0.5,p*4);
      drawEnergyBall(f.x+10, f.y-50, 5+p*15, '#ffffaa','#ffaa00', p);
    });
    from.classList.remove('charging');
    sfx.beam();
    await animLoop(450, p => {
      const reach = Math.min(p*2, 1);
      const ex = f.x + (t.x - f.x) * reach;
      const ey = f.y-50 + (t.y - f.y+50) * reach;
      drawBeam(f.x+10, f.y-50, ex, ey, 12, '#ffee44', '#ff8800');
      drawEnergyBall(f.x+10, f.y-50, 12, '#ffffaa','#ffaa00');
      if (p > 0.5) drawEnergyBall(ex,ey, 18+p*12, '#fff','#ffaa00', 1-((p-0.5)*2));
    });
  },

  async armstretch(from, to) {
    const f = getPos(from), t = getPos(to);
    sfx.punch();
    await animLoop(300, p => {
      const ex = f.x+40 + (t.x - f.x-40) * p;
      const ey = f.y + (t.y - f.y) * p;
      ctx.save();
      ctx.strokeStyle = '#4a8c3f'; ctx.lineWidth = 8; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(f.x+40, f.y); ctx.lineTo(ex, ey); ctx.stroke();
      // fist at end
      drawEnergyBall(ex, ey, 10, '#5aa84a','#3a7830');
      ctx.restore();
    });
    // impact
    drawImpact(t.x, t.y, 30, '#44ff44');
    flashScreen('#ffffff');
    await wait(200);
    // retract
    await animLoop(200, p => {
      const ex = t.x + (f.x+40 - t.x) * p;
      const ey = t.y + (f.y - t.y) * p;
      clearFx();
      ctx.save();
      ctx.strokeStyle = '#4a8c3f'; ctx.lineWidth = 8; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(f.x+40, f.y); ctx.lineTo(ex, ey); ctx.stroke();
      ctx.restore();
    });
    clearFx();
  },

  async klon(from, to) {
    const f = getPos(from), t = getPos(to);
    // flash
    from.classList.add('charging'); sfx.charge();
    await animLoop(300, p => {
      drawAura(f.x,f.y,60,'#44ff44', p, p*8);
    });
    from.classList.remove('charging');
    // ghost clone appears at enemy, strikes
    await animLoop(400, p => {
      const gx = t.x - 40, gy = t.y;
      ctx.save(); ctx.globalAlpha = 0.5 * (p < 0.5 ? p*2 : 2-p*2);
      // draw a green silhouette
      drawEnergyBall(gx, gy, 35, '#44ff44','#228800', ctx.globalAlpha);
      ctx.restore();
      if (p > 0.4 && p < 0.6) drawImpact(t.x, t.y, 30, '#44ff44', 1);
    });
    flashScreen('#44ff44');
    clearFx();
  },

  // -- FREEZER --
  async deathbeam(from, to) {
    const f = getPos(from), t = getPos(to);
    sfx.laserThin();
    await animLoop(200, p => {
      drawEnergyBall(f.x+40, f.y-15, 3+p*5, '#ff88ff','#8800aa', p);
    });
    // instant thin laser
    await animLoop(250, p => {
      const alpha = p < 0.3 ? 1 : 1 - (p-0.3)/0.7;
      // thin deadly beam
      drawBeam(f.x+40, f.y-15, t.x, t.y, 3, '#ff44ff', '#8800cc', alpha);
      drawEnergyBall(f.x+40, f.y-15, 5, '#ffaaff','#aa00ff', alpha);
      if (p > 0.1 && p < 0.4) drawImpact(t.x, t.y, 20, '#cc44ff', 1-(p-0.1)/0.3);
    });
    flashScreen('#ff88ff');
  },

  async deathball(from, to) {
    const f = getPos(from), t = getPos(to);
    from.classList.add('charging'); sfx.charge();
    const bx = f.x + 30, by = f.y - 60;
    // grow massive ball above finger
    await animLoop(800, p => {
      drawAura(f.x,f.y,50,'#ff4444',p*0.3,p*4);
      drawEnergyBall(bx, by, 5+p*50, '#ff6644','#aa0000', Math.min(p*2,1));
      // swirling particles
      for (let i = 0; i < 6; i++) {
        const a = (i/6)*Math.PI*2 + p*8;
        const r = 40+p*20;
        drawEnergyBall(bx+Math.cos(a)*r, by+Math.sin(a)*r, 3, '#ff8844','#ff0000', p*0.5);
      }
    });
    from.classList.remove('charging');
    sfx.bigBeam();
    await animLoop(500, p => {
      const ease = p*p;
      const cx = bx + (t.x-bx)*ease;
      const cy = by + (t.y-by)*ease;
      drawEnergyBall(cx, cy, 55-p*15, '#ff6644','#aa0000');
      if (p > 0.75) {
        const ep = (p-0.75)/0.25;
        drawImpact(t.x, t.y, 50+ep*90, '#ff4400', 1-ep);
        flashScreen('#ff6644');
      }
    });
  },

  async tailwhip(from, to) {
    const f = getPos(from), t = getPos(to);
    sfx.punch();
    await animLoop(250, p => {
      from.style.transform = `translateX(${(t.x-f.x)*p*0.6}px) translateY(${(t.y-f.y)*p*0.6}px) scaleX(-1) rotate(${p*360}deg)`;
    });
    drawImpact(t.x, t.y, 30, '#cc44ff');
    flashScreen('#ffffff');
    await wait(150);
    clearFx();
    await animLoop(200, p => {
      from.style.transform = `translateX(${(t.x-f.x)*0.6*(1-p)}px) translateY(${(t.y-f.y)*0.6*(1-p)}px) scaleX(-1)`;
    });
    from.style.transform = '';
  },

  async novastrike(from, to) {
    const f = getPos(from), t = getPos(to);
    from.classList.add('charging'); sfx.charge();
    // envelop in aura
    await animLoop(500, p => {
      drawAura(f.x,f.y,90,'#aa44ff',p,p*8);
      drawEnergyBall(f.x,f.y,30+p*20, '#dd88ff','#6600cc', p*0.5);
    });
    from.classList.remove('charging');
    sfx.energyBall();
    await animLoop(350, p => {
      const ease = p < 0.5 ? 2*p*p : 1-2*(1-p)*(1-p);
      const cx = f.x + (t.x - f.x) * ease;
      const cy = f.y + (t.y - f.y) * ease;
      from.style.transform = `translateX(${(t.x-f.x)*ease}px) translateY(${(t.y-f.y)*ease}px) scaleX(-1)`;
      drawEnergyBall(cx, cy, 40, '#dd88ff','#6600cc', 0.6);
      drawAura(cx,cy,50,'#aa44ff',0.8,p*10);
      // trail
      for (let i = 1; i <= 4; i++) {
        const tt = Math.max(0, ease - i*0.08);
        const tx = f.x + (t.x-f.x)*tt;
        const ty = f.y + (t.y-f.y)*tt;
        drawEnergyBall(tx,ty, 20-i*4, '#aa44ff','#440088', 0.3-i*0.06);
      }
    });
    drawImpact(t.x, t.y, 50, '#aa44ff');
    flashScreen('#dd88ff');
    await wait(200);
    clearFx();
    // return
    await animLoop(300, p => {
      from.style.transform = `translateX(${(t.x-f.x)*(1-p)}px) translateY(${(t.y-f.y)*(1-p)}px) scaleX(-1)`;
    });
    from.style.transform = '';
  },

  // -- CELL --
  async kamehameha_cell(from, to) {
    const f = getPos(from), t = getPos(to);
    from.classList.add('charging'); sfx.charge();
    await animLoop(500, p => {
      drawAura(f.x,f.y,70,'#44ddaa',p,p*5);
      drawEnergyBall(f.x+40, f.y, 6+p*14, '#88ffdd','#00aa66', p);
    });
    from.classList.remove('charging');
    sfx.beam();
    await animLoop(500, p => {
      const reach = Math.min(p*1.8, 1);
      const ex = f.x + (t.x - f.x) * reach;
      const ey = f.y + (t.y - f.y) * reach;
      drawBeam(f.x+40, f.y, ex, ey, 12, '#44ffcc', '#0066aa');
      drawEnergyBall(f.x+40, f.y, 12, '#88ffdd','#0088aa');
      if (p > 0.5) drawEnergyBall(ex,ey, 18+p*12, '#fff','#44ddaa', 1-((p-0.5)*2));
    });
  },

  async solarkamehameha(from, to) {
    const f = getPos(from), t = getPos(to);
    from.classList.add('charging'); sfx.charge();
    // massive charge
    await animLoop(700, p => {
      drawAura(f.x,f.y,100,'#ffff44',p,p*6);
      drawEnergyBall(f.x+40, f.y, 8+p*25, '#fffff0','#ffaa00', p);
      if (p > 0.5) flashScreen('#ffffcc');
    });
    from.classList.remove('charging');
    sfx.bigBeam();
    await animLoop(600, p => {
      const reach = Math.min(p*1.5, 1);
      const ex = f.x + (t.x - f.x) * reach;
      const ey = f.y + (t.y - f.y) * reach;
      drawBeam(f.x+40, f.y, ex, ey, 28, '#ffffaa', '#ff8800');
      drawEnergyBall(f.x+40, f.y, 24, '#fffff0','#ffcc00');
      if (p > 0.4) {
        const ep = (p-0.4)/0.6;
        drawImpact(t.x, t.y, 60+ep*80, '#ffaa00', 1-ep*0.5);
      }
    });
    flashScreen('#ffffcc');
  },

  async absorption(from, to) {
    const f = getPos(from), t = getPos(to);
    sfx.absorb();
    const particles = [];
    for (let i = 0; i < 20; i++) {
      particles.push({
        sx: t.x + (Math.random()-0.5)*60,
        sy: t.y + (Math.random()-0.5)*60,
        delay: Math.random() * 0.4,
        color: '#44ff44', r: 3+Math.random()*4
      });
    }
    await animLoop(800, p => {
      particles.forEach(pt => {
        const pp = Math.max(0, Math.min(1, (p - pt.delay) / 0.6));
        if (pp > 0) {
          const x = pt.sx + (f.x - pt.sx) * pp;
          const y = pt.sy + (f.y - pt.sy) * pp;
          drawEnergyBall(x, y, pt.r * (1-pp*0.5), '#88ff88', '#00aa00', 1-pp*0.3);
        }
      });
      // glow on cell growing
      if (p > 0.3) drawAura(f.x,f.y,50,'#44ff44',(p-0.3)*1.4,p*5);
      // enemy flickers
      if (p > 0.2) to.style.filter = `brightness(${1 + Math.sin(p*30)*0.3})`;
    });
    to.style.filter = '';
    flashScreen('#44ff44');
  },

  async cellpunch(from, to) {
    const f = getPos(from), t = getPos(to);
    sfx.punch();
    from.classList.add('charging'); sfx.charge();
    await animLoop(200, p => {
      drawAura(f.x,f.y,50,'#44ff44',p,p*6);
    });
    from.classList.remove('charging');
    await animLoop(200, p => {
      from.style.transform = `translateX(${(t.x-f.x)*p*0.7}px) translateY(${(t.y-f.y)*p*0.7}px)`;
      drawAura(f.x+(t.x-f.x)*p*0.7, f.y+(t.y-f.y)*p*0.7, 40, '#44ff44', 0.6, p*8);
    });
    drawImpact(t.x, t.y, 40, '#44ff44');
    flashScreen('#ffffff');
    await wait(150);
    clearFx();
    await animLoop(200, p => {
      from.style.transform = `translateX(${(t.x-f.x)*0.7*(1-p)}px) translateY(${(t.y-f.y)*0.7*(1-p)}px)`;
    });
    from.style.transform = '';
  }
};

// === SCREEN MANAGEMENT ===
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'select-screen') buildCharGrid();
  if (id === 'battle-screen') setTimeout(initCanvas, 50);
}

function buildCharGrid() {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = '';
  characters.forEach(c => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.dataset.id = c.id;
    card.innerHTML = `
      <div class="char-sprite-box">${sprites[c.id]}</div>
      <div class="name">${c.name}</div>
      <div class="stats">HP: ${c.hp}<br>Level: ${c.level}<br>Attacken: ${c.attacks.length}</div>
    `;
    card.onclick = () => { sfx.menuSelect(); selectChar(c.id); };
    grid.appendChild(card);
  });
}

function selectChar(id) {
  selectedChar = id;
  document.querySelectorAll('.char-card').forEach(c => c.classList.toggle('selected', c.dataset.id === id));
  document.getElementById('fightBtn').classList.add('visible');
}

function startBattle() {
  if (!selectedChar) return;
  sfx.menuConfirm();
  const player = characters.find(c => c.id === selectedChar);
  const enemies = characters.filter(c => c.id !== selectedChar);
  const enemy = enemies[Math.floor(Math.random() * enemies.length)];
  playerState = { ...player, currentHp: player.hp };
  enemyState = { ...enemy, currentHp: enemy.hp };
  showScreen('battle-screen');
  initBattle();
}

function initBattle() {
  battleActive = true;
  document.getElementById('playerName').textContent = playerState.name;
  document.getElementById('playerLevel').textContent = `Lv ${playerState.level}`;
  document.getElementById('playerFighter').innerHTML = sprites[playerState.id];
  updateHpBar('player');
  document.getElementById('enemyName').textContent = enemyState.name;
  document.getElementById('enemyLevel').textContent = `Lv ${enemyState.level}`;
  document.getElementById('enemyFighter').innerHTML = sprites[enemyState.id];
  updateHpBar('enemy');
  document.getElementById('playerFighter').className = 'fighter player-fighter';
  document.getElementById('enemyFighter').className = 'fighter enemy-fighter';
  sfx.battleAppear();
  startBGM();
  showMessage(`Ein wildes ${enemyState.name} erscheint!`, () => showAttackMenu());
}

function updateHpBar(who) {
  const state = who === 'player' ? playerState : enemyState;
  const pct = Math.max(0, (state.currentHp / state.hp) * 100);
  const bar = document.getElementById(who === 'player' ? 'playerHpBar' : 'enemyHpBar');
  const text = document.getElementById(who === 'player' ? 'playerHpText' : 'enemyHpText');
  bar.style.width = pct + '%';
  bar.className = 'hp-bar ' + (pct > 50 ? 'high' : pct > 20 ? 'mid' : 'low');
  text.textContent = `${Math.max(0, Math.floor(state.currentHp))} / ${state.hp}`;
}

function showMessage(text, callback) {
  const el = document.getElementById('messageText');
  document.getElementById('actionMenu').innerHTML = '';
  el.textContent = '';
  let i = 0;
  const interval = setInterval(() => {
    if (i < text.length) { el.textContent += text[i]; i++; }
    else { clearInterval(interval); if (callback) setTimeout(callback, 600); }
  }, 30);
}

function showAttackMenu() {
  if (!battleActive) return;
  const menu = document.getElementById('actionMenu');
  menu.innerHTML = '';
  document.getElementById('messageText').textContent = `Was soll ${playerState.name} tun?`;
  playerState.attacks.forEach((atk, i) => {
    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.innerHTML = `${atk.name}<span class="atk-type">${atk.type} | ${atk.power} PWR</span>`;
    btn.onclick = () => { sfx.menuSelect(); doAttack(true, i); };
    menu.appendChild(btn);
  });
}

function disableMenu() {
  document.querySelectorAll('.action-btn').forEach(b => b.disabled = true);
}

function calcDamage(power, atkLevel, defLevel) {
  const base = ((2 * atkLevel / 5 + 2) * power / 50) + 2;
  return Math.floor(base * (0.85 + Math.random() * 0.15) * (Math.random() < 0.1 ? 1.5 : 1));
}

async function doAttack(isPlayer, atkIndex) {
  if (!battleActive) return;
  if (isPlayer) disableMenu();

  const attacker = isPlayer ? playerState : enemyState;
  const defender = isPlayer ? enemyState : playerState;
  const atk = attacker.attacks[atkIndex];
  const hit = Math.random() * 100 < atk.accuracy;
  const attackerEl = document.getElementById(isPlayer ? 'playerFighter' : 'enemyFighter');
  const defenderEl = document.getElementById(isPlayer ? 'enemyFighter' : 'playerFighter');

  showMessage(`${attacker.name} setzt ${atk.name} ein!`, async () => {
    initCanvas();

    // Run the animation
    const animFn = attackAnims[atk.anim];
    if (animFn) {
      await animFn(attackerEl, defenderEl);
    }
    clearFx();

    // Apply hit/damage
    if (hit) {
      sfx.hit();
      defenderEl.classList.add('damaged');
      await wait(400);
      defenderEl.classList.remove('damaged');

      const dmg = calcDamage(atk.power, attacker.level, defender.level);
      defender.currentHp -= dmg;
      updateHpBar(isPlayer ? 'enemy' : 'player');

      if (defender.currentHp <= 0) {
        defender.currentHp = 0;
        updateHpBar(isPlayer ? 'enemy' : 'player');
        defenderEl.classList.add('fainted');
        stopBGM();
        showMessage(`${defender.name} wurde besiegt${isPlayer ? '!' : '...'}`, () => {
          battleActive = false;
          showResult(isPlayer);
        });
        return;
      }
      showMessage(`${defender.name} nimmt ${dmg} Schaden!`, () => {
        if (isPlayer) setTimeout(() => enemyTurn(), 500);
        else showAttackMenu();
      });
    } else {
      sfx.miss();
      showMessage(`${atk.name} ging daneben!`, () => {
        if (isPlayer) setTimeout(() => enemyTurn(), 500);
        else showAttackMenu();
      });
    }
  });
}

function enemyTurn() {
  if (!battleActive) return;
  const atkIndex = Math.floor(Math.random() * enemyState.attacks.length);
  doAttack(false, atkIndex);
}

function showResult(won) {
  setTimeout(() => {
    showScreen('result-screen');
    const sprite = document.getElementById('resultSprite');
    const title = document.getElementById('resultTitle');
    const text = document.getElementById('resultText');
    if (won) {
      sprite.innerHTML = sprites[playerState.id];
      title.textContent = 'SIEG!';
      title.style.color = '#ffd700';
      text.textContent = `${playerState.name} hat ${enemyState.name} besiegt!`;
      sfx.victory();
    } else {
      sprite.innerHTML = sprites[enemyState.id];
      title.textContent = 'NIEDERLAGE...';
      title.style.color = '#ff4444';
      text.textContent = `${enemyState.name} war zu stark...`;
      sfx.defeat();
    }
  }, 1000);
}

function resetGame() { stopBGM(); selectedChar = null; showScreen('select-screen'); }

window.addEventListener('resize', () => { if(canvas) initCanvas(); });
</script>
